<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — GreenLake Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(16,185,129,0.08), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59,130,246,0.07), transparent 50%);
        }

        .login-card {
            width: 420px;
            background: rgba(24,24,27,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            animation: fadeUp 0.4s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
        }

        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .logo-text p {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 13px 16px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: rgba(16,185,129,0.5);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(16,185,129,0.4);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .error-msg {
            display: {% if error %}flex{% else %}none{% endif %};
            align-items: center;
            gap: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.875rem;
            color: #f87171;
            margin-bottom: 20px;
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-row">
            <div class="logo-box">🌿</div>
            <div class="logo-text">
                <h1>GreenLake Platform</h1>
                <p>Internal Operations Tool</p>
            </div>
        </div>

        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to access your workspace.</p>

        <div class="error-msg" id="errorMsg">
            ⚠️ {% if error %}{{ error }}{% endif %}
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="your.username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="footer-note">HPE GreenLake · Internal Tool · Authorized Users Only</div>
    </div>
</body>
</html>
